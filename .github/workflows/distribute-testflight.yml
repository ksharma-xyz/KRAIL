name: Distribute TestFlight

on:
  workflow_call:
    inputs:
      artifact-name:
        required: false
        type: string
      notify-testers:
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      notify-testers:
        description: 'Notify external testers after upload'
        required: false
        default: false
        type: boolean

jobs:
  distribute:
    runs-on: macos-15
    environment: Firebase
    env:
      # Fastlane auto-detects these — no temp .p8 file needed (pattern from chrisbanes/tivi).
      APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
      APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
      # Prevent xcodebuild settings query from timing out on slow CI runners.
      FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT: 120
    steps:
      - uses: actions/checkout@v6

      # Select Xcode before anything else runs.
      # xcversion is removed from Fastfile — it relies on the sunsetted xcode-install gem
      # and is broken on macos-15 (fastlane/fastlane#29469, actions/runner-images#12205).
      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '~16'  # pin to stable Xcode 16.x; latest-stable can pick up pre-releases

      - name: Setup environment variables
        run: |
          echo "IOS_NSW_TRANSPORT_API_KEY=${{ secrets.IOS_NSW_TRANSPORT_API_KEY }}" >> $GITHUB_ENV
          echo "ANDROID_NSW_TRANSPORT_API_KEY=${{ secrets.ANDROID_NSW_TRANSPORT_API_KEY }}" >> $GITHUB_ENV

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - run: brew install swiftlint

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-disabled: true

      - name: Firebase iOS - GoogleService-Info.plist file
        env:
          DATA: ${{ secrets.FIREBASE_IOS_GOOGLE_INFO }}
        run: echo "$DATA" | base64 -d > iosApp/iosApp/GoogleService-Info.plist

      # The MapLibre SPM package must be compiled by Gradle before Xcode archives the app.
      # Without this, fastlane's build_app (archive) fails to resolve the framework.
      # Uses IosArm64 (real device target) unlike build-ios.yml which uses IosSimulatorArm64.
      - name: Pre-build SPM for MapLibre (Gradle - device)
        run: |
          ./gradlew :feature:trip-planner:ui:SwiftPackageConfigAppleSpmMaplibreCompileSwiftPackageIosArm64 --no-daemon --stacktrace

      - name: Import Code-Signing Certificates
        uses: Apple-Actions/import-codesign-certs@v6
        with:
          p12-file-base64: ${{ secrets.IOS_DIST_SIGNING_KEY_BASE64 }}
          p12-password: ${{ secrets.IOS_DIST_SIGNING_KEY_PASSWORD }}

      - name: Download Provisioning Profiles
        uses: Apple-Actions/download-provisioning-profiles@v5
        with:
          bundle-id: xyz.ksharma.krail
          profile-type: IOS_APP_STORE
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}

      - name: Verify signing configuration
        run: |
          echo "=== Signing config ==="
          echo "DEVELOPMENT_TEAM : ${{ vars.DEVELOPMENT_TEAM }}"
          echo "APP_BUNDLE_ID    : xyz.ksharma.krail"
          echo "PROVISIONING_PROFILE_NAME set : ${{ secrets.IOS_PROVISIONING_PROFILE_NAME != '' }}"
          echo "IOS_DIST_SIGNING_KEY_BASE64 set : ${{ secrets.IOS_DIST_SIGNING_KEY_BASE64 != '' }}"
          echo "APPSTORE_KEY_ID set : ${{ secrets.APPSTORE_KEY_ID != '' }}"
          echo "=== Installed provisioning profiles ==="
          ls ~/Library/MobileDevice/Provisioning\ Profiles/ 2>/dev/null \
            && echo "(profiles found)" \
            || echo "WARNING: no profiles installed"

      # Resolve SPM packages before Fastlane runs so xcodebuild doesn't try to
      # resolve dependencies while signing settings are active (causes silent failure).
      - name: Resolve Swift Packages
        run: |
          cd iosApp
          xcodebuild -resolvePackageDependencies -scheme iosApp -project iosApp.xcodeproj

      - name: Build iOS App for Release
        env:
          IOS_NSW_TRANSPORT_API_KEY: ${{ secrets.IOS_NSW_TRANSPORT_API_KEY }}
          APP_BUNDLE_ID: xyz.ksharma.krail
          PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
          DEVELOPMENT_TEAM: ${{ vars.DEVELOPMENT_TEAM }}
        run: |
          cd iosApp
          bundle exec fastlane build_release

      - name: Upload to TestFlight
        run: |
          cd iosApp
          bundle exec fastlane upload_testflight

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact-name || format('iosApp-release-ipa-{0}', github.run_id) }}
          path: iosApp/build/*.ipa
          retention-days: 30

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ios-build-logs-${{ github.run_id }}
          path: iosApp/build/logs
          retention-days: 3
