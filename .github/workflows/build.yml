name: Krail App CI

on:
  push:
    branches: [ main ]          # prod/* is handled by release-2-deploy-rc.yml
  pull_request:
    branches: [ main, prod/* ] # PRs to prod branches still get a quality+build check
    types: [ opened, synchronize, reopened, ready_for_review ]

permissions:
  actions: write  # allows build-android.yml to write back ANDROID_VERSION_CODE

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# The Dependabot gate lives inside build-android.yml and build-ios.yml, not here. The
# branch ruleset for `main` requires the contexts "build-android-debug / build",
# "build-android-release / build" and "build-ios / build", which are named after the
# inner job of the reusable workflow. Skipping a caller job below emits a check run
# named only "build-android-debug", so the required context never reports and the pull
# request stays blocked. Skipping the inner job still emits the fully qualified name
# with a skipped conclusion, which does satisfy the requirement.
jobs:
  code-quality:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    uses: ./.github/workflows/code-quality.yml

  build-android-debug:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    needs: code-quality
    uses: ./.github/workflows/build-android.yml
    with:
      variant: debug
    secrets: inherit

  build-android-release:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    needs: code-quality
    uses: ./.github/workflows/build-android.yml
    with:
      variant: release
    secrets: inherit

  build-ios:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    needs: code-quality
    uses: ./.github/workflows/build-ios.yml
    secrets: inherit

  distribute-debug-apk-firebase:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-android-debug
    uses: ./.github/workflows/distribute-firebase.yml
    with:
      variant: debug
    secrets: inherit

  distribute-release-apk-firebase:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-android-release
    uses: ./.github/workflows/distribute-firebase.yml
    with:
      variant: release
    secrets: inherit
