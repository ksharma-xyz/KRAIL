name: "1. Cut Release Branch"

# Manual workflow to kick off a release cycle.
#
# Reads the current versionName from main's build.gradle.kts and:
#   1. Creates prod/{version} from the base branch
#   2. Immediately bumps versionName on main to the next version
#      so development on main is always ahead of what's in the release branch.
#
# Flow:
#   main (1.19.0) → prod/1.19.0 created, main bumped to 1.20.0
#   → Pushing prod/1.19.0 automatically triggers release-2-deploy-rc.yml
#     which builds, tags v1.19.0-RC1, and distributes to GP Internal + TestFlight.
#
# Usage: Actions → 1. Cut Release Branch → Run workflow

on:
  workflow_dispatch:
    inputs:
      base-branch:
        description: 'Branch to cut release from'
        required: true
        default: 'main'
        type: string
      next-version:
        description: 'Version to set on main after cutting (e.g. 1.20.0). Leave blank to auto-increment minor.'
        required: false
        type: string

jobs:
  create-release-branch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.base-branch }}
          token: ${{ secrets.PAT_KRAIL_GITHUB }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Read versionName from build.gradle.kts
        id: version
        run: |
          VERSION=$(grep -oP '(?<=versionName = ")[^"]+' androidApp/build.gradle.kts)
          if [ -z "$VERSION" ]; then
            echo "::error::Could not read versionName from androidApp/build.gradle.kts"
            exit 1
          fi
          echo "name=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "::notice::Detected version: ${VERSION} — will create prod/${VERSION}"

      - name: Check branch does not already exist
        run: |
          if git ls-remote --exit-code --heads origin "prod/${{ steps.version.outputs.name }}" > /dev/null 2>&1; then
            echo "::error::Branch prod/${{ steps.version.outputs.name }} already exists."
            exit 1
          fi

      - name: Create and push release branch
        run: |
          git checkout -b "prod/${{ steps.version.outputs.name }}"
          git push origin "prod/${{ steps.version.outputs.name }}"
          echo "::notice::Created prod/${{ steps.version.outputs.name }} — release-2-deploy-rc.yml will now build RC1"

      # ── Bump version on main immediately after cutting the release branch ───────
      # main always carries the *next* version so new PRs merged to main never
      # accidentally share a versionName with an in-flight release branch.

      - name: Compute next version
        id: next
        run: |
          SUPPLIED="${{ inputs.next-version }}"
          if [ -n "$SUPPLIED" ]; then
            NEXT="$SUPPLIED"
          else
            CURRENT="${{ steps.version.outputs.name }}"
            MAJOR=$(echo "$CURRENT" | cut -d. -f1)
            MINOR=$(echo "$CURRENT" | cut -d. -f2)
            NEXT="${MAJOR}.$((MINOR + 1)).0"
          fi
          echo "next=${NEXT}" >> "$GITHUB_OUTPUT"
          echo "::notice::Bumping main to ${NEXT}"

      - name: Create bump branch off main
        run: |
          git checkout main
          git checkout -b "chore/bump-version-${{ steps.next.outputs.next }}"

      - name: Bump versionName in build.gradle.kts
        run: |
          sed -i 's/versionName = "[^"]*"/versionName = "${{ steps.next.outputs.next }}"/' androidApp/build.gradle.kts
          grep "versionName" androidApp/build.gradle.kts

      - name: Bump MARKETING_VERSION in Config.xcconfig
        run: |
          # iOS version source of truth is MARKETING_VERSION in Config.xcconfig.
          # Info.plist only references it via $(MARKETING_VERSION), so it must NOT
          # be edited here — writing a literal there would clobber the variable.
          FILE="iosApp/Configuration/Config.xcconfig"
          if ! grep -q '^MARKETING_VERSION=' "$FILE"; then
            echo "::error::MARKETING_VERSION not found in ${FILE}"
            exit 1
          fi
          sed -i 's/^MARKETING_VERSION=.*/MARKETING_VERSION=${{ steps.next.outputs.next }}/' "$FILE"
          grep '^MARKETING_VERSION=' "$FILE"

      - name: Commit and open version bump PR into main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git add androidApp/build.gradle.kts iosApp/Configuration/Config.xcconfig
          if git diff --staged --quiet; then
            echo "::notice::No changes to commit — main may already be at ${{ steps.next.outputs.next }}"
            exit 0
          fi

          BRANCH="chore/bump-version-${{ steps.next.outputs.next }}"
          git commit -m "chore: bump version to ${{ steps.next.outputs.next }}"
          git push origin "$BRANCH"

          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: bump version to ${{ steps.next.outputs.next }}" \
            --body "Automated version bump on main after cutting prod/${{ steps.version.outputs.name }}. main always carries the next version so PRs merged to main never share a versionName with an in-flight release branch.")
          echo "::notice::Opened version bump PR: ${PR_URL}"

          # Best-effort auto-merge; leave the PR open if required checks/settings block it.
          gh pr merge "$PR_URL" --squash --auto \
            && echo "::notice::Auto-merge enabled for ${PR_URL}" \
            || echo "::warning::Could not enable auto-merge — merge ${PR_URL} manually."
