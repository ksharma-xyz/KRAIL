name: Create GitHub Release

# Manual fallback for creating a draft GitHub Release.
#
# The normal path no longer needs this: release-2-deploy-rc.yml creates and
# refreshes a draft release on every RC, and you publish it in the GitHub UI
# (which creates the final v{version} tag). This workflow stays as a manual
# escape hatch — e.g. to (re)generate a draft for a hand-made prod branch or a
# tag created outside the RC flow.
#
# It is intentionally NOT triggered by tag pushes anymore: publishing the draft
# creates the v{version} tag, and reacting to that push would flip the freshly
# published release back to a draft.

on:
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag name (e.g. v1.19.0)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ inputs.tag_name }}
          generate_release_notes: true
          draft: true
