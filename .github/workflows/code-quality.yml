name: Code Quality

on:
  workflow_call:
    outputs:
      detekt-passed:
        description: "Whether Detekt checks passed"
        value: ${{ jobs.detekt.outputs.passed }}

jobs:
  detekt:
    runs-on: ubuntu-latest
    environment: Firebase
    # Hard cap so a hung test (e.g. an unbounded `advanceUntilIdle()` against a
    # `while (isActive)` polling loop) can't sit on a runner for 6h. Detekt is
    # ~3min, host tests ~10min on a cold cache, so 20min is generous head-room.
    timeout-minutes: 20
    outputs:
      passed: ${{ steps.detekt.outcome == 'success' }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup environment variables
        run: |
          echo "ANDROID_NSW_TRANSPORT_API_KEY=${{ secrets.ANDROID_NSW_TRANSPORT_API_KEY }}" >> $GITHUB_ENV
          echo "IOS_NSW_TRANSPORT_API_KEY=${{ secrets.IOS_NSW_TRANSPORT_API_KEY }}" >> $GITHUB_ENV

      - name: set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      # Test-infrastructure guardrails — run BEFORE detekt/tests so a misconfigured
      # module (missing withHostTest{}, test code leaking into production, ad-hoc
      # duplicated fakes) fails fast with a clear message instead of silently
      # skipping its tests. These tasks are also wired into `check` for local runs.
      - name: Verify test wiring
        id: verify-test-wiring
        env:
          CI: true
          GITHUB_ACTIONS: true
        run: >-
          ./gradlew
          verifyTestWiring verifyTestingModuleUsage verifyNoAdHocBoundaryFakes
          --continue -PciQuality=true

      # -PciQuality=true tells core/network/build.gradle.kts to skip the
      # API-key requirement and use placeholders instead — neither detekt nor
      # the host tests hit the network so real keys aren't needed.
      - name: Run Detekt
        id: detekt
        env:
          ANDROID_NSW_TRANSPORT_API_KEY: ${{ secrets.ANDROID_NSW_TRANSPORT_API_KEY }}
          IOS_NSW_TRANSPORT_API_KEY: ${{ secrets.IOS_NSW_TRANSPORT_API_KEY }}
          CI: true
          GITHUB_ACTIONS: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew detekt -PciQuality=true

      # Run all KMP host tests (Compose UI tests via Robolectric live in
      # androidUnitTest, so this also exercises them). --continue surfaces every
      # failing module in one CI run instead of stopping at the first.
      - name: Run host tests
        id: tests
        if: always() && steps.detekt.conclusion != 'cancelled'
        env:
          ANDROID_NSW_TRANSPORT_API_KEY: ${{ secrets.ANDROID_NSW_TRANSPORT_API_KEY }}
          IOS_NSW_TRANSPORT_API_KEY: ${{ secrets.IOS_NSW_TRANSPORT_API_KEY }}
          CI: true
          GITHUB_ACTIONS: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew testAndroidHostTest --continue -PciQuality=true

      - name: Upload Detekt reports
        if: always() && steps.detekt.conclusion != 'skipped'
        uses: actions/upload-artifact@v7
        with:
          name: detekt-reports-${{ github.run_id }}
          path: |
            **/build/reports/detekt/detekt.html
            **/build/reports/detekt/detekt.xml
            **/build/reports/detekt/detekt.md
            **/build/reports/detekt/detekt.txt
            build/reports/problems/problems-report.html
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload test reports
        if: always() && steps.tests.conclusion != 'skipped'
        uses: actions/upload-artifact@v7
        with:
          name: test-reports-${{ github.run_id }}
          path: |
            **/build/reports/tests/**
            **/build/test-results/**
          if-no-files-found: ignore
          retention-days: 7
