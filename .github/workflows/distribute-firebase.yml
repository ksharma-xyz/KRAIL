name: Firebase App Distribution

on:
  workflow_call:
    inputs:
      variant:
        required: true
        type: string
      release-notes:
        # Optional override for the Firebase release notes. Defaults to the head
        # commit subject (used by main pushes). RC distributions pass the RC tag
        # here so testers see "v1.21.0-RC2" instead of a random commit title.
        required: false
        type: string
        default: ''
      group:
        # Optional override for the Firebase tester group. Defaults to "Internal"
        # for debug builds and "Friends" for release builds.
        required: false
        type: string
        default: ''

jobs:
  distribute-apk:
    runs-on: ubuntu-latest
    environment: Firebase
    steps:
      - uses: actions/checkout@v6

      - name: Download APK artifact
        uses: actions/download-artifact@v8
        with:
          name: androidApp-${{ inputs.variant }}-apk-${{ github.run_id }}

      - name: List files in extracted artifact
        run: ls

      - name: Download Firebase CLI
        run: curl -sL https://firebase.tools | bash

      - name: Authenticate with Firebase
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > gcloud.json

      - name: Set Firebase Project App ID
        run: |
          if [ "${{ inputs.variant }}" = "debug" ]; then
            echo "FIREBASE_APP_ID=${{ secrets.FIREBASE_ANDROID_DEBUG_APP_ID }}" >> $GITHUB_ENV
          else
            echo "FIREBASE_APP_ID=${{ secrets.FIREBASE_ANDROID_PROD_APP_ID }}" >> $GITHUB_ENV
          fi

      - name: Distribute APK to Firebase App Distribution
        # IMPORTANT: never inline `${{ ... }}` containing untrusted data (commit
        # messages, PR titles, branch names, issue bodies, etc.) directly into a
        # `run:` shell script. GitHub Actions substitutes `${{ ... }}` as raw
        # text BEFORE the shell parses, so any shell metacharacter in the value
        # (`(`, `)`, `"`, `$`, `;`, backticks, `&&`, ...) breaks the script or
        # executes arbitrary commands. This bit us with a commit titled
        # `... auto-bump PR (#1566)` whose `(#1566)` parsed as a sub-shell.
        # Always pass such values through `env:` and reference them as `$VAR`,
        # which the shell expands AFTER parsing and treats as opaque data.
        env:
          GOOGLE_APPLICATION_CREDENTIALS: gcloud.json
          FIREBASE_APP_ID: ${{ env.FIREBASE_APP_ID }}
          NOTES_OVERRIDE: ${{ inputs.release-notes }}
          GROUP_OVERRIDE: ${{ inputs.group }}
          VARIANT: ${{ inputs.variant }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          # Take only the first line of the commit message (the subject).
          COMMIT_TITLE=$(printf '%s' "$COMMIT_MESSAGE" | head -n1 | tr -d '\r')

          if [ "$VARIANT" = "debug" ]; then
            DEFAULT_NOTES="Debug: $COMMIT_TITLE"
            DEFAULT_GROUP="Internal"
            APK="androidApp-debug.apk"
          else
            DEFAULT_NOTES="Release: $COMMIT_TITLE"
            DEFAULT_GROUP="Friends"
            APK="androidApp-release.apk"
          fi

          NOTES="${NOTES_OVERRIDE:-$DEFAULT_NOTES}"
          GROUP="${GROUP_OVERRIDE:-$DEFAULT_GROUP}"

          firebase appdistribution:distribute "$APK" \
            --app "$FIREBASE_APP_ID" \
            --groups "$GROUP" \
            --release-notes "$NOTES"

      - name: Cleanup sensitive files
        run: rm -f gcloud.json
