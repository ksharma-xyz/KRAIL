name: Krail App CI

on:
  push:
    branches: [ main ]          # prod/* is handled by release-2-deploy-rc.yml
  pull_request:
    branches: [ main, prod/* ] # PRs to prod branches still get a quality+build check
    types: [ opened, synchronize, reopened, ready_for_review ]

permissions:
  actions: write  # allows build-android.yml to write back ANDROID_VERSION_CODE

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# Dependabot pull requests run with the Dependabot secret store, so `secrets.*` and
# `vars.*` from the Actions store both resolve to empty strings. That makes the signing
# builds impossible: `core/network/build.gradle.kts` fails configuration with
# "Register API key and put in local.properties as `ANDROID_NSW_TRANSPORT_API_KEY`",
# and build-android.yml has no `vars.ANDROID_VERSION_CODE` to read. Those jobs are
# therefore skipped for Dependabot; `code-quality` still runs (it compiles, runs host
# tests, and substitutes placeholder API keys via the CI quality-check flag), and it is
# the only required status check.
jobs:
  code-quality:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    uses: ./.github/workflows/code-quality.yml

  build-android-debug:
    if: >-
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
      && github.actor != 'dependabot[bot]'
    needs: code-quality
    uses: ./.github/workflows/build-android.yml
    with:
      variant: debug
    secrets: inherit

  build-android-release:
    if: >-
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
      && github.actor != 'dependabot[bot]'
    needs: code-quality
    uses: ./.github/workflows/build-android.yml
    with:
      variant: release
    secrets: inherit

  build-ios:
    if: >-
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
      && github.actor != 'dependabot[bot]'
    needs: code-quality
    uses: ./.github/workflows/build-ios.yml
    secrets: inherit

  distribute-debug-apk-firebase:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-android-debug
    uses: ./.github/workflows/distribute-firebase.yml
    with:
      variant: debug
    secrets: inherit

  distribute-release-apk-firebase:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-android-release
    uses: ./.github/workflows/distribute-firebase.yml
    with:
      variant: release
    secrets: inherit
